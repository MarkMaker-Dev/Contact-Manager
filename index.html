<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="contactCard.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body onload="getFromLocal()">

    <h1>Contact Manager</h1>
    <div class="main-container">

        <div class="form-section">
            <input id="contfirstName" type="text" placeholder="First Name">
            <input id="contlastName" type="text" placeholder="Last Name">
            <input id="contPhone" type="text" placeholder="Phone">
            <input id="contEmail" type="text" placeholder="Email">
            <input id="contAddress" type="text" placeholder="Address">
            <input id="contWork" type="text" placeholder="Work Info">
            <input id="contRelationship" type="text" placeholder="Relationship">
            <input id="contImage" type="text" placeholder="Image URL">

            <button onclick="addContact()">Add Contact</button>
            <button onclick="clearcontact()">Delete All</button>
        </div>

        <div id="result"></div>

    </div>


    <script>
        let contArray = []

        function addContact() {

            let contObj = {
                contfirstName: contfirstName.value,
                contlastName: contlastName.value,
                contPhone: contPhone.value,
                contEmail: contEmail.value,
                contAddress: contAddress.value,
                contWork: contWork.value,
                contRelationship: contRelationship.value,
                contImage: contImage.value,
                favourite: false
            };

            if (
                contfirstName.value.trim() === "" ||
                contPhone.value.trim() === ""
            ) {
                alert("First Name and Phone are required");
                return;
            }

            contArray.push(contObj);

            saveToLocal();

            displaycont();

            console.log(contArray);
        }

        function saveToLocal() {
            let convCont = JSON.stringify(contArray);
            localStorage.setItem("contacts", convCont);
            console.log(19);

        }

        function getFromLocal() {
            let itemsFromLocal = localStorage.getItem("contacts")
            let convCont = JSON.parse(itemsFromLocal)
            console.log(convCont);

            if (convCont == null) {
                console.log("nothing in local");
            } else {
                contArray = convCont
                console.log(contArray);
                displaycont()
            }

        }

        function displaycont() {
            result.innerHTML = ""
            contfirstName.value = ""
            contfirstName.value = "";
            contlastName.value = "";
            contPhone.value = "";
            contEmail.value = "";
            contAddress.value = "";
            contWork.value = "";
            contRelationship.value = "";
            contImage.value = "";
            for (let i = 0; i < contArray.length; i++) {
                result.innerHTML += `
                    <div class ="card" style="width: 20rem;">
                        <img src="${contArray[i].contImage || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}"class="profile-img"alt="profile">
                        <div class="card-body">
                            <h3>
                            ${contArray[i].favourite ? "⭐" : ""}
                            ${contArray[i].contfirstName}
                            ${contArray[i].contlastName}
                            </h3>
                            <span class="d-lg-inline-block">
                                <h5 class="card-title d-inline">First Name:${contArray[i].contfirstName}</h5> 
                            </span>
                            <p class="card-text">Last Name:${contArray[i].contlastName}</p>
                            <p class="card-text">Phone no:${contArray[i].contPhone}</p>
                            <p class="card-text">Email: ${contArray[i].contEmail}</p>
                            <p class="card-text">Address: ${contArray[i].contAddress}</p>
                            <p class="card-text">Work: ${contArray[i].contWork}</p>
                            <p class="card-text">Relationship: ${contArray[i].contRelationship}</p>
                            <span> 
                                <button class="btn btn-warning "onclick="toggleFavourite(${i})"> ${contArray[i].favourite ? "★ Favourite" : "☆ Favourite"}</button>
                                <button class="btn btn-primary" onclick="edititem(${i})"> Edit</button> 
                                <button class="btn btn-danger" onclick="deleteitem(${i})"> Delete</button> 
                            </span>
                        </div>
                    </div>  
                `

            }

        }



        function toggleFavourite(i) {

            contArray[i].favourite =
                !contArray[i].favourite;

            saveToLocal();

            displaycont();
        }


        function clearcontact() {

            if (contArray.length >= 1) {
                contArray = []
                displaycont()
            } else {

                alert("no contact to delete")
            }

            saveToLocal()
        }

        function deleteitem(i) {
            contArray.splice(i, 1);
            saveToLocal();
            displaycont();
        }

        function edititem(i) {
            const newcontfirstName = prompt("First name to edit?", contArray[i].contfirstName);
            const newcontlastName = prompt("Last Name to edit?", contArray[i].contlastName);
            const newcontPhone = prompt("Phone number to edit?", contArray[i].contPhone);
            const newcontEmail = prompt("Email to edit?", contArray[i].contEmail);
            const newcontAddress = prompt("Address to edit?", contArray[i].contAddress);
            const newcontImage = prompt("Image to edit?", contArray[i].contImage);
            const newcontWork = prompt("Work to edit?", contArray[i].contWork);
            const newcontRelationship = prompt("Relationship to edit?", contArray[i].contRelationship);


            contArray.splice(i, 1, {
                contfirstName: newcontfirstName ? newcontfirstName : contArray[i].contfirstName,
                contlastName: newcontlastName ? newcontlastName : contArray[i].contlastName,
                contPhone: newcontPhone ? newcontPhone : contArray[i].contPhone,
                contEmail: newcontEmail ? newcontEmail : contArray[i].contEmail,
                contAddress: newcontAddress ? newcontAddress : contArray[i].contAddress,
                contImage: newcontImage ? newcontImage : contArray[i].contImage,
                contWork: newcontWork ? newcontWork : contArray[i].contWork,
                contRelationship: newcontRelationship ? newcontRelationship : contArray[i].contRelationship
            });
            displaycont();
            saveToLocal();

        }








    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
